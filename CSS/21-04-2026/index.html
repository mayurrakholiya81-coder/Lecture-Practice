<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Layout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<h2 class="title">Output:</h2>

<div class="main">

    <!-- Top Image Card -->
    <div class="top-card">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" alt="">
    </div>

    <!-- Bottom Cards -->
    <div class="bottom">

        <!-- Left Card -->
        <div class="team-box">
            <h3>Meet Our Team</h3>

            <div class="card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg">
                <h4>Michael Brown</h4>
                <p><i class="fa-solid fa-code"></i> Frontend Developer</p>
            </div>
        </div>

        <!-- Right Card -->
        <div class="profile-box">
            <div class="profile">
                <div class="info">
                    <h4>Krish R</h4>
                    <p>Instructor</p>
                </div>
                <img src="https://randomuser.me/api/portraits/men/45.jpg">
            </div>

            <div class="social">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-linkedin-in"></i>
                <i class="fab fa-instagram"></i>
            </div>

            <p class="desc">
                Subscribe Easy Tutorials YouTube channel to watch more videos on Web design
            </p>
        </div>

    </div>

</div>

</body>
</html>
