<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parallax World</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="parallax">
        <h1>Welcome to the Parallax World</h1>
    </div>

    <div class="section linear">
        <h3>Linear Gradient Section</h3>
    </div>

    
    <div class="section radial">
        <h3>Radial Gradient Section</h3>
    </div>


    <div class="section conic">
        <h3>Conic Gradient Section</h3>
    </div>
 <div class="text-block highlight">
        This block uses two classes: <b>text-block</b> and <b>highlight</b>.
    </div>

    <div class="parent">
        <h2>Parent Box Heading</h2>
        <p>This paragraph is a child element styled inside the parent.</p>
    </div>

</body>
</html>
